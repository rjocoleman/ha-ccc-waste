pre-commit:
  parallel: true
  commands:
    ruff-check:
      glob: "*.py"
      run: uv run ruff check --force-exclude {staged_files}
      stage_fixed: true
    ruff-format:
      glob: "*.py"
      run: uv run ruff format --check --force-exclude {staged_files}
    mypy:
      glob: "*.py"
      run: uv run mypy custom_components/ccc_waste
    zizmor:
      glob: ".github/workflows/*.{yml,yaml}"
      run: uvx zizmor@1.25.2 {staged_files}

pre-push:
  commands:
    pytest:
      run: uv run pytest
