name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - run: uv sync --group dev
      - run: uv run ruff check --output-format=github .
      - run: uv run ruff format --check .

  typecheck:
    name: mypy --strict
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - run: uv sync --group dev --group test
      - run: uv run mypy custom_components/ccc_waste

  test:
    name: pytest (HA ${{ matrix.ha }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - ha: "2026.6.3"
            phacc: "0.13.339"
          - ha: "2026.5.1"
            phacc: "0.13.330"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - run: uv sync --group test
      # Override the locked plugin/HA pair to test against each supported HA release.
      - env:
          PHACC: ${{ matrix.phacc }}
        run: uv pip install "pytest-homeassistant-custom-component==${PHACC}"
      - run: >-
          uv run --no-sync pytest
          --cov=custom_components/ccc_waste
          --cov-report=term-missing
          --cov-report=xml
      - run: >-
          uv run --no-sync coverage report
          --include="*/api.py,*/coordinator.py,*/schedule.py" --fail-under=95

  zizmor:
    name: zizmor
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - run: uvx zizmor@1.25.2 --persona=pedantic .github/workflows
