version: 2
updates:
  # Dev toolchain only - there are no runtime dependencies to track.
  - package-ecosystem: uv
    directory: "/"
    schedule:
      interval: weekly
    groups:
      dev-dependencies:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
